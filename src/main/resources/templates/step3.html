<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Insurance Self-Service - Step 3</title>
  <!-- Bootstrap 5 via Webjars -->
  <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f9;
    }

    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .progress-bar-container {
      margin-bottom: 2rem;
    }

    .read-only-derived {
      background-color: #e9ecef;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <h2 class="text-center mb-4 text-primary fw-bold">Travel Insurance Portal</h2>

        <div class="progress-bar-container">
          <div class="d-flex justify-content-between mb-1 small text-muted">
            <span>Step 3: Customer Details</span>
            <span>50% Complete</span>
          </div>
          <div class="progress" style="height: 8px;">
            <div class="progress-bar bg-primary" role="progressbar" style="width: 50%;" aria-valuenow="50"
              aria-valuemin="0" aria-valuemax="100"></div>
          </div>
        </div>

        <div class="card p-4">
          <h4 class="card-title mb-4 fw-semibold">Enter Customer Details</h4>

          <form th:action="@{/step3}" th:object="${customerForm}" method="post">

            <div class="mb-3">
              <label for="fullName" class="form-label fw-medium">Full Name</label>
              <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''" placeholder="Ali Muthu">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Full Name
                Error</div>
            </div>

            <div class="mb-3">
              <label for="nric" class="form-label fw-medium">NRIC (12 digits)</label>
              <input type="text" id="nric" th:field="*{nric}" class="form-control"
                th:classappend="${#fields.hasErrors('nric')} ? 'is-invalid' : ''" placeholder="e.g. 950704145123"
                maxlength="12" oninput="parseNric()">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('nric')}" th:errors="*{nric}">NRIC
                Error</div>
              <div class="form-text small">Must contain 12 numeric digits representing YYMMDD plus
                identification codes.</div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6 mb-3 mb-md-0">
                <label for="dobDisplay" class="form-label fw-medium text-secondary">Date of
                  Birth</label>
                <input type="text" id="dobDisplay" class="form-control read-only-derived text-muted" readonly
                  th:value="*{dob}" placeholder="Derived from NRIC">
              </div>
              <div class="col-md-6">
                <label for="genderDisplay" class="form-label fw-medium text-secondary">Gender</label>
                <input type="text" id="genderDisplay" class="form-control read-only-derived text-muted" readonly
                  th:value="*{gender}" placeholder="Derived from NRIC">
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-medium">Email Address</label>
              <input type="email" id="email" th:field="*{email}" class="form-control"
                th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" placeholder="alimuthu@example.com">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                Email Error</div>
            </div>

            <div class="mb-3">
              <label for="mobileNo" class="form-label fw-medium">Mobile Number</label>
              <input type="text" id="mobileNo" th:field="*{mobileNo}" class="form-control"
                th:classappend="${#fields.hasErrors('mobileNo')} ? 'is-invalid' : ''" placeholder="e.g. 0123456789"
                maxlength="11">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('mobileNo')}" th:errors="*{mobileNo}">Mobile No
                Error</div>
            </div>

            <div class="mb-3">
              <label for="addressLine1" class="form-label fw-medium">Address Line 1</label>
              <input type="text" id="addressLine1" th:field="*{addressLine1}" class="form-control"
                th:classappend="${#fields.hasErrors('addressLine1')} ? 'is-invalid' : ''"
                placeholder="No 123, Jalan Bukit">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('addressLine1')}" th:errors="*{addressLine1}">
                Address Line 1 Error</div>
            </div>

            <div class="mb-3">
              <label for="addressLine2" class="form-label fw-medium text-secondary">Address Line 2
                (Optional)</label>
              <input type="text" id="addressLine2" th:field="*{addressLine2}" class="form-control"
                placeholder="Taman Indah">
            </div>

            <div class="mb-3">
              <label for="postcode" class="form-label fw-medium">Postcode</label>
              <input type="text" id="postcode" th:field="*{postcode}" class="form-control"
                th:classappend="${#fields.hasErrors('postcode')} ? 'is-invalid' : ''" placeholder="50450" maxlength="5">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('postcode')}" th:errors="*{postcode}">Postcode
                Error</div>
            </div>

            <div class="d-flex justify-content-between mt-4">
              <a th:href="@{/step2}" class="btn btn-outline-secondary btn-lg px-4">Back</a>
              <button type="submit" class="btn btn-primary btn-lg px-5 fw-semibold">Next: Summary</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    function parseNric() {
      const nricVal = document.getElementById('nric').value.trim();
      const dobDisplay = document.getElementById('dobDisplay');
      const genderDisplay = document.getElementById('genderDisplay');

      if (/^\d{12}$/.test(nricVal)) {
        const yy = nricVal.substring(0, 2);
        const mm = nricVal.substring(2, 4);
        const dd = nricVal.substring(4, 6);

        const month = parseInt(mm, 10);
        const day = parseInt(dd, 10);

        if (month < 1 || month > 12) {
          clearDerivedFields();
          return;
        }

        const currentYearLastTwo = new Date().getFullYear() % 100;
        const yearVal = parseInt(yy, 10);
        const fullYear = (yearVal <= currentYearLastTwo) ? (2000 + yearVal) : (1900 + yearVal);

        const dateObj = new Date(fullYear, month - 1, day);
        if (dateObj.getFullYear() === fullYear && dateObj.getMonth() === (month - 1) && dateObj.getDate() === day) {
          const formattedMonth = String(month).padStart(2, '0');
          const formattedDay = String(day).padStart(2, '0');
          dobDisplay.value = `${fullYear}-${formattedMonth}-${formattedDay}`;

          const lastDigit = parseInt(nricVal.charAt(11), 10);
          genderDisplay.value = (lastDigit % 2 !== 0) ? 'MALE' : 'FEMALE';

          fetch(`/api/customers/lookup/${nricVal}`)
            .then(response => {
              if (response.ok) return response.json();
              throw new Error('Customer profile not found in history database.');
            })
            .then(data => {
              if (!document.getElementById('fullName').value) document.getElementById('fullName').value = data.fullName;
              if (!document.getElementById('email').value) document.getElementById('email').value = data.email;
              if (!document.getElementById('mobileNo').value) document.getElementById('mobileNo').value = data.mobileNo;
              if (!document.getElementById('addressLine1').value) document.getElementById('addressLine1').value = data.addressLine1;
              if (!document.getElementById('addressLine2').value) document.getElementById('addressLine2').value = data.addressLine2 || '';
              if (!document.getElementById('postcode').value) document.getElementById('postcode').value = data.postcode;
            })
            .catch(err => console.log(err.message));
        } else {
          clearDerivedFields();
        }
      } else {
        clearDerivedFields();
      }
    }

    function clearDerivedFields() {
      document.getElementById('dobDisplay').value = '';
      document.getElementById('genderDisplay').value = '';
    }

    window.addEventListener('DOMContentLoaded', (event) => {
      parseNric();
    });
  </script>

  <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
